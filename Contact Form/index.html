<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="form-header">
        <div class="container container--flex">
        <img src="/images/vector.svg" alt="imagem de um usuário ilustrativo"
        class="form-header__imagem-perfil" >
        <h1 class="form-header__titulo">Contact Form</h1>
        <p class="form-header__texto">Insira os dados do contato e clique em enviar</p>
        </div>
    </header>

<main>
    <div class="container">
        <form class="form-contact" action="">
            <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="nome">Nome</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="nome" name="nome" placeholder="Nome">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">
                </div>
            </div>
            <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="email">Email</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input" type="email" id="email" name="email" placeholder="email@gmail.com">
                </div>
            </div>
            <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="telefone">Telefone</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--terco" type="tel" id="pais" name="telefone" placeholder="+55">
                    <input class="form-contact__input form-contact__input--terco" type="tel" id="ddd" name="telefone" placeholder="ddd">
                    <input class="form-contact__input form-contact__input--terco" type="tel" id="telefone" name="telefone" placeholder=" 00000-0000">
                </div>
            </div>
            <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="endereco">Endereço</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--quarto" type="text" id="cep" name="endereco" placeholder="cep: 00000-000" maxlength="8" onblur="buscarEndereco(this.value)">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="rua" name="endereco" placeholder="Rua: Exemplo">
                    <input class="form-contact__input form-contact__input--quarto" type="text" id="numero" name="endereco" placeholder="número: 0000">
                </div>
            </div>
            <div class="form-contact__linha form-contact__linha--2">
                <div class="form-contact__col-b">
                     <input class="form-contact__input form-contact__input--terco" type="text" id="apto" name="endereco" placeholder="Apto: 000">
                    <input class="form-contact__input form-contact__input--terco" type="text" id="bairro" name="endereco" placeholder="Bairro: Exemplo">
                    <input class="form-contact__input form-contact__input--terco" type="text" id="cidade" name="endereco" placeholder="Cidade: Exemplo">
                </div>
            </div>
            <div class="form-contact__linha form-contact__linha--3">
                <div class="form-contact__col-b">
                     <input class="form-contact__input form-contact__input--terco" type="text" id="estado" name="endereco" placeholder="Estado: Exemplo">
                </div>
            </div>
             <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="anotacoes">Anotações</label>
                </div>
                <div class="form-contact__col-b">
                    <textarea class="form-contact__input form-contact__textarea" id="anotacoes" name="anotacoes" placeholder="Suas anotações aqui"></textarea>
                </div>
            </div>
            <div class="form-contact__linha--button">
                <div class="form-contact__col-b">
                    <button onclick="validarFormulario()" class="form-contact__button" type="button">Cadastrar</button>
                </div>
                <div class="form-contact__col-b">
                    <button class="form-contact__button" type="reset">Limpar</button>
                </div>
            </div>
        </form>
    </div>
</main>
<footer>
    Todos os direitos reservados
</footer>

<script src="js/script.js"></script>
</body>
</html>
