<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="titulo">Olá, eu sou o título da página</h1>
    <button onclick="Saudacao()">Clique aqui</button>
    <br>
    <button onmousemove="mouseMoveu()">Passe o mouse</button>
    <br>
    <button onmousedown="clicouBaixo()">Segure o click</button>
    <br>
    <button onmouseup="clicouSubiu()">Solte o click</button>
    <br>
    <button ondblclick="cliqueDuplo()">Clique duplo</button>



    <script>
        function Saudacao() {
            alert(`Titulo: ${document.getElementById("titulo").textContent}`);
        }
        function mouseMoveu() {
            alert("O mouse moveu no botão");
        }
        function clicouBaixo() {
            alert("O mouse abaixou");
        }
        function clicouSubiu() {
            alert("O mouse subiu");
        }
        function cliqueDuplo() {
            alert("Você deu um clique duplo");
        }
    </script>
</body>

</html>
